<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Ventas</title>
<style>
body{font-family:sans-serif;background:#0d1117;color:#e6edf3;padding:16px;margin:0}
h2{color:#58a6ff;margin-bottom:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:12px}
.stat{font-size:28px;font-weight:700;color:#3fb950}
.label{font-size:11px;color:#8b949e;text-transform:uppercase;margin-bottom:4px}
.venta{padding:10px 0;border-bottom:1px solid #30363d}
.venta:last-child{border-bottom:none}
.vh{display:flex;justify-content:space-between;margin-bottom:4px}
.hora{font-size:11px;color:#8b949e}
.total{font-size:15px;font-weight:700;color:#3fb950}
.prods{font-size:12px;color:#e6edf3}
.tag{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:2px 8px;margin:2px;font-size:11px}
.err{color:#f85149;padding:12px}
button{background:#58a6ff;color:#000;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:12px}
.loading{color:#8b949e;text-align:center;padding:20px}
</style>
</head>
<body>

<h2>📊 Ventas del día</h2>
<button onclick="cargar()">↻ Cargar ventas</button>

<div class="card">
  <div class="label">Total del día</div>
  <div class="stat" id="total">—</div>
</div>
<div class="card">
  <div class="label">Transacciones</div>
  <div class="stat" id="count" style="color:#58a6ff">—</div>
</div>

<div class="card">
  <div class="label" style="margin-bottom:10px">Últimas ventas con detalle</div>
  <div id="lista"><div class="loading">Toca "Cargar ventas"</div></div>
</div>

<div id="error" class="err" style="display:none"></div>

<script>
const URL = "https://ngobtpdhlqxvocesufbw.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nb2J0cGRobHF4dm9jZXN1ZmJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTQ1MjEsImV4cCI6MjA5NjE5MDUyMX0.EciHeMh0tMKwbznfLq7PbAaS-CHmS6wdPlAX_OE9WG4";

function hoy() { return new Date().toISOString().slice(0,10); }

async function get(path) {
  const r = await fetch(URL + path, {
    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + await r.text());
  return r.json();
}

async function cargar() {
  document.getElementById('lista').innerHTML = '<div class="loading">Cargando...</div>';
  document.getElementById('error').style.display = 'none';

  try {
    const fecha = hoy();
    
    // 1. Ventas de hoy
    const ventas = await get(`/rest/v1/ventas?fecha=eq.${fecha}&anulada=eq.0&select=id,hora,total&order=id.desc&limit=200`);
    
    const totalDia = ventas.reduce((s,v) => s + parseFloat(v.total||0), 0);
    document.getElementById('total').textContent = '$' + totalDia.toFixed(2);
    document.getElementById('count').textContent = ventas.length;

    if (ventas.length === 0) {
      document.getElementById('lista').innerHTML = '<div class="loading">Sin ventas hoy</div>';
      return;
    }

    // 2. Detalles por rango de IDs
    const ids = ventas.map(v => v.id);
    const minId = Math.min(...ids);
    const maxId = Math.max(...ids);
    const idsSet = new Set(ids);

    const dets = await get(`/rest/v1/venta_detalle?venta_id=gte.${minId}&venta_id=lte.${maxId}&select=venta_id,descripcion,cantidad,subtotal&limit=5000`);
    
    // Agrupar detalles por venta
    const detMap = {};
    dets.filter(d => idsSet.has(d.venta_id)).forEach(d => {
      if (!detMap[d.venta_id]) detMap[d.venta_id] = [];
      detMap[d.venta_id].push(d);
    });

    // Renderizar
    document.getElementById('lista').innerHTML = ventas.slice(0,30).map(v => {
      const prods = (detMap[v.id] || [])
        .map(d => `<span class="tag">${(d.descripcion||'').trim()} ×${parseFloat(d.cantidad||0).toFixed(0)}</span>`)
        .join('');
      return `<div class="venta">
        <div class="vh">
          <span class="hora">${(v.hora||'').substring(0,8)}</span>
          <span class="total">$${parseFloat(v.total||0).toFixed(2)}</span>
        </div>
        <div class="prods">${prods || '<span style="color:#8b949e">Sin detalle</span>'}</div>
      </div>`;
    }).join('');

  } catch(e) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = '⚠ Error: ' + e.message;
    document.getElementById('lista').innerHTML = '';
  }
}

// Cargar automáticamente
cargar();
setInterval(cargar, 60000);
</script>
</body>
</html>
